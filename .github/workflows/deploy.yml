name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency: 
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          toolchain: stable
          cache: true

      - name: Install mise and build
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Install SpacetimeDB
        run: curl -sSf https://install.spacetimedb.com | sh -s -- --yes

      - name: Install dependencies
        run: mise run prepare:web

      - name: Check
        run: mise run check

      - name: Build frontend
        run: mise run build:web
        env:
          NEXT_PUBLIC_SPACETIMEDB_URI: https://maincloud.spacetimedb.com
          NEXT_PUBLIC_SPACETIMEDB_MODULE: aether-voices-01

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

      - name: Publish SpacetimeDB module
        run: mise run publish:spacetimedb
        env: 
          SPACETIME_TOKEN: ${{ secrets.SPACETIME_TOKEN }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
