name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency: 
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise and build
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Build frontend
        run: cd web && npm ci && npm run build
        env:
          NEXT_PUBLIC_SPACETIMEDB_URI: ${{ secrets.NEXT_PUBLIC_SPACETIMEDB_URI }}
          NEXT_PUBLIC_SPACETIMEDB_MODULE: ${{ secrets.NEXT_PUBLIC_SPACETIMEDB_MODULE || 'aether_voices' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@3
        with:
          path: web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@4
