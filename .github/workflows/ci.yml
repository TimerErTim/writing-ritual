name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise and run check
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Run type/compile checks
        run: mise run check
